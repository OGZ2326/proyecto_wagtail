{% extends "base.html" %}
{% load wagtailcore_tags %}

{% block content %}
<div class="container my-5">
    <h1>{{ page.title }}</h1>
    {% if page.intro %}
        <div class="row mb-4">
            <div class="col-lg-10">{{ page.intro|richtext }}</div>
        </div>
    {% endif %}
    {% for block in page.content %}
        {% include_block block %}
    {% endfor %}
</div>
{% endblock %}
