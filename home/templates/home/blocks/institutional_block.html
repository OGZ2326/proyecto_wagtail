{% load wagtailimages_tags %}
<section id="institucional" class="py-4">
    <div class="container">
        <div class="row align-items-stretch">
            
            <div class="col-lg-6 d-flex flex-column justify-content-center">
                <h2 class="institucional-title mb-3">{{ value.title }}</h2>
                <p class="institucional-text">{{ value.text_line1 }}</p>
                {% if value.text_line2 %}
                    <p class="institucional-text">{{ value.text_line2 }}</p>
                {% endif %}
                {% if value.button_text and value.button_link %}
                    <a href="{{ value.button_link }}" class="btn btn-institucional mt-3">{{ value.button_text }}</a>
                {% endif %}
            </div>
            
            <div class="col-lg-6 d-flex">
                <div class="institucional-img-wrapper">
                    {% image value.image width-600 class="institucional-img" %}
                </div>
            </div>
            
        </div>
    </div>
</section>
