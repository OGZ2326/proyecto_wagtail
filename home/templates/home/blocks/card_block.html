{% load wagtailcore_tags %}

{% if value.external_link or value.link_page %}
    <a href="{% if value.external_link %}{{ value.external_link }}{% elif value.link_page %}{% pageurl value.link_page %}{% endif %}" class="card-link-wrapper">
        <div class="custom-card {{ value.gradient_class }}">
            <div class="card-logo">
                <i class="bi {{ value.icon }}"></i>
            </div>
            <h5>
                {{ value.title_line1 }}<br>{{ value.title_line2 }}
                <span class="card-arrow" aria-hidden="true">→</span>
            </h5>
        </div>
    </a>
{% else %}
    <div class="custom-card {{ value.gradient_class }}">
        <div class="card-logo">
            <i class="bi {{ value.icon }}"></i>
        </div>
        <h5>
            {{ value.title_line1 }}<br>{{ value.title_line2 }}
        </h5>
        {% if request.user.is_staff %}
            <div class="alert alert-warning small mt-2 mb-0" role="alert">
                Esta tarjeta no tiene enlace configurado.
            </div>
        {% endif %}
    </div>
{% endif %}
